<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Detalhes do Pokémon - AV1 DWB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">AV1 DWB - Pokédex</a>
      </div>
    </nav>

    <main class="container my-4">
      <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

      <div id="loading" class="d-flex justify-content-center my-4">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Carregando...</span>
        </div>
      </div>

      <div id="details-container" class="card d-none">
        <div class="row g-0 align-items-center">
          <div class="col-md-4 text-center p-4">
            <img id="poke-image" src="" alt="pokemon image" class="img-fluid" />
          </div>
          <div class="col-md-8">
            <div class="card-body">
              <h3 id="post-title" class="card-title"></h3>
              <p><strong>Tipos:</strong> <span id="poke-types"></span></p>
              <p><strong>Habilidades:</strong> <span id="poke-abilities"></span></p>
              <p><strong>Altura:</strong> <span id="poke-height"></span> | <strong>Peso:</strong> <span id="poke-weight"></span></p>
              <a id="back-button" class="btn btn-secondary" href="index.html">Voltar à Pokédex</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/detalhes.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
