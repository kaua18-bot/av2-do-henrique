<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fatos de Gatos - AV1 DWB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">AV1 DWB - Fatos de Gatos</a>
      </div>
    </nav>

    <main class="container my-4">
      <div class="row mb-3">
        <div class="col-12 col-md-8">
          <input id="search-input" class="form-control" type="search" placeholder="Pesquisar fatos de gatos..." aria-label="Pesquisar" />
        </div>
        <div class="col-12 col-md-4 mt-2 mt-md-0">
          <button id="search-clear" class="btn btn-outline-secondary w-100">Limpar pesquisa</button>
        </div>
      </div>

      <div id="no-results" class="alert alert-warning d-none">Nenhum fato encontrado para a pesquisa.</div>
      <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

      <div id="loading" class="d-flex justify-content-center my-4">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Carregando fatos...</span>
        </div>
      </div>

      <div id="cards-container" class="row g-3"></div>
    </main>

    <script src="js/script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
